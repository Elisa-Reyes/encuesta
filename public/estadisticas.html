<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estadísticas - Encuesta Bookie</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --primary: #2d5f4f;
        --primary-light: #4a8a73;
        --accent: #e8a33d;
        --bg: #f6f4ef;
        --card: #ffffff;
        --text: #2b2b2b;
        --muted: #6b6b6b;
        --border: #e2ddd2;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 0 0 60px;
      }
      header {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        color: white;
        padding: 40px 20px 30px;
        text-align: center;
      }
      header h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }
      header p {
        margin: 0;
        opacity: 0.9;
        font-size: 0.95rem;
      }

      .container {
        max-width: 1100px;
        margin: -20px auto 0;
        padding: 0 16px;
      }

      .summary-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .card-stat {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      .card-stat .value {
        font-size: 2rem;
        font-weight: 700;
        color: var(--primary);
      }
      .card-stat .label {
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: 4px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      @media (max-width: 800px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      .section.full {
        grid-column: 1 / -1;
      }
      .section h2 {
        font-size: 1.05rem;
        color: var(--primary);
        margin-top: 0;
        margin-bottom: 14px;
        border-bottom: 2px solid var(--accent);
        padding-bottom: 8px;
      }
      canvas {
        max-height: 320px;
      }

      .respuestas-abiertas {
        max-height: 250px;
        overflow-y: auto;
      }
      .respuestas-abiertas li {
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
      }
      .respuestas-abiertas li:last-child {
        border-bottom: none;
      }

      #estado {
        text-align: center;
        color: var(--muted);
        padding: 40px;
        font-size: 0.95rem;
      }

      .btn-bar {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .refresh-btn {
        margin: 0;
        padding: 10px 20px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
      }
      .refresh-btn:hover {
        background: var(--primary-light);
      }
      .refresh-btn.excel {
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>📊 Estadísticas - Encuesta de Usabilidad Bookie</h1>
      <p>Resumen de las respuestas de los docentes evaluadores</p>
    </header>

    <div class="container">
      <div class="btn-bar">
        <button class="refresh-btn" onclick="cargarDatos()">
          🔄 Actualizar datos
        </button>
        <button
          class="refresh-btn excel"
          onclick="window.location.href = '/api/encuestas/excel'"
        >
          📥 Descargar Excel
        </button>
      </div>

      <div id="estado">Cargando datos...</div>
      <div id="contenido" style="display: none">
        <div class="summary-cards" id="tarjetasResumen"></div>

        <div class="section full">
          <h2>Promedio por pregunta (escala 1-5)</h2>
          <canvas id="chartPromedioPreguntas"></canvas>
        </div>

        <div class="section full">
          <h2>Promedio por sección</h2>
          <canvas id="chartSecciones"></canvas>
        </div>

        <div class="grid">
          <div class="section">
            <h2>Dispositivo principal utilizado</h2>
            <canvas id="chartDispositivo"></canvas>
          </div>
          <div class="section">
            <h2>Inconveniente técnico más notorio</h2>
            <canvas id="chartInconveniente"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script>
      let charts = {};

      const SECCIONES = {
        "Selección y Asignación": [1, 2, 3, 4, 5],
        "Monitoreo y Reportes": [6, 7, 8, 9, 10],
        "Usabilidad e Interfaz": [11, 12, 13, 14, 15],
        "Carga de Trabajo y Errores": [16, 17, 18],
      };

      async function cargarDatos() {
        const estado = document.getElementById("estado");
        const contenido = document.getElementById("contenido");
        estado.style.display = "block";
        contenido.style.display = "none";
        estado.textContent = "Cargando datos...";

        try {
          const res = await fetch("/api/encuestas");
          if (!res.ok) throw new Error("Error al obtener datos");
          const json = await res.json();
          const encuestas = json.data || [];

          if (encuestas.length === 0) {
            estado.textContent = "Todavía no hay respuestas registradas.";
            return;
          }

          estado.style.display = "none";
          contenido.style.display = "block";
          renderTarjetas(encuestas);
          renderGraficas(encuestas);
        } catch (err) {
          estado.textContent = "⚠️ Error al cargar los datos: " + err.message;
          console.error(err);
        }
      }

      function promedio(arr) {
        if (!arr.length) return 0;
        return arr.reduce((a, b) => a + b, 0) / arr.length;
      }

      function contarValores(arr, key) {
        const conteo = {};
        arr.forEach((item) => {
          const val = item[key];
          if (val === null || val === undefined || val === "") return;
          conteo[val] = (conteo[val] || 0) + 1;
        });
        return conteo;
      }

      function renderTarjetas(encuestas) {
        const totalPreguntas = 18;
        let sumaGeneral = 0;
        encuestas.forEach((e) => {
          for (let i = 1; i <= totalPreguntas; i++)
            sumaGeneral += e[`preg${i}`] || 0;
        });
        const promedioGeneral = (
          sumaGeneral /
          (encuestas.length * totalPreguntas)
        ).toFixed(2);

        const promediosPreguntas = Array.from(
          { length: totalPreguntas },
          (_, i) => promedio(encuestas.map((e) => e[`preg${i + 1}`])),
        );
        const mejorIdx = promediosPreguntas.indexOf(
          Math.max(...promediosPreguntas),
        );
        const peorIdx = promediosPreguntas.indexOf(
          Math.min(...promediosPreguntas),
        );

        const sinInconvenientes = encuestas.filter(
          (e) =>
            e.inconvenienteTecnico ===
            "Ninguno, la navegación y las cargas fueron fluidas",
        ).length;

        const tarjetas = [
          { valor: encuestas.length, label: "Respuestas totales" },
          { valor: promedioGeneral, label: "Promedio general (1-5)" },
          {
            valor: `Preg ${mejorIdx + 1}`,
            label: `Mejor calificada (${promediosPreguntas[mejorIdx].toFixed(1)})`,
          },
          {
            valor: `Preg ${peorIdx + 1}`,
            label: `Peor calificada (${promediosPreguntas[peorIdx].toFixed(1)})`,
          },
          {
            valor: `${sinInconvenientes}/${encuestas.length}`,
            label: "Sin inconvenientes técnicos",
          },
        ];

        document.getElementById("tarjetasResumen").innerHTML = tarjetas
          .map(
            (t) => `
      <div class="card-stat">
        <div class="value">${t.valor}</div>
        <div class="label">${t.label}</div>
      </div>
    `,
          )
          .join("");
      }

      function crearGrafica(id, tipo, labels, valores, colores) {
        const ctx = document.getElementById(id);
        if (charts[id]) charts[id].destroy();

        charts[id] = new Chart(ctx, {
          type: tipo,
          data: {
            labels,
            datasets: [
              {
                data: valores,
                backgroundColor: colores || [
                  "#2d5f4f",
                  "#4a8a73",
                  "#e8a33d",
                  "#6b9b8a",
                  "#c97f2f",
                  "#8fb9a8",
                  "#d4a24a",
                ],
                borderRadius: tipo === "bar" ? 6 : 0,
                borderWidth: tipo === "pie" || tipo === "doughnut" ? 2 : 0,
                borderColor: "#ffffff",
              },
            ],
          },
          options: {
            responsive: true,
            indexAxis:
              tipo === "bar" && id === "chartPromedioPreguntas" ? "y" : "x",
            plugins: {
              legend: {
                display: tipo === "pie" || tipo === "doughnut",
                position: "bottom",
              },
            },
            scales:
              tipo === "bar"
                ? {
                    x:
                      id === "chartPromedioPreguntas"
                        ? { min: 0, max: 5 }
                        : { beginAtZero: true },
                    y:
                      id === "chartPromedioPreguntas"
                        ? {}
                        : {
                            beginAtZero: true,
                            max: id === "chartSecciones" ? 5 : undefined,
                          },
                  }
                : {},
          },
        });
      }

      function renderGraficas(encuestas) {
        const labelsPreguntas = Array.from(
          { length: 18 },
          (_, i) => `Preg ${i + 1}`,
        );
        const promediosPreguntas = labelsPreguntas.map((_, i) =>
          promedio(encuestas.map((e) => e[`preg${i + 1}`])).toFixed(2),
        );
        crearGrafica(
          "chartPromedioPreguntas",
          "bar",
          labelsPreguntas,
          promediosPreguntas,
        );

        const labelsSecciones = Object.keys(SECCIONES);
        const promediosSecciones = labelsSecciones.map((sec) => {
          const preguntas = SECCIONES[sec];
          const valores = [];
          encuestas.forEach((e) =>
            preguntas.forEach((p) => valores.push(e[`preg${p}`])),
          );
          return promedio(valores).toFixed(2);
        });
        crearGrafica(
          "chartSecciones",
          "bar",
          labelsSecciones,
          promediosSecciones,
        );

        const dispositivo = contarValores(encuestas, "dispositivoPrincipal");
        crearGrafica(
          "chartDispositivo",
          "pie",
          Object.keys(dispositivo),
          Object.values(dispositivo),
        );

        const inconveniente = contarValores(encuestas, "inconvenienteTecnico");
        crearGrafica(
          "chartInconveniente",
          "bar",
          Object.keys(inconveniente),
          Object.values(inconveniente),
        );
      }

      cargarDatos();
    </script>
  </body>
</html>
